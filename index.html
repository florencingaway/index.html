<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Birthday Story 💛</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: linear-gradient(180deg,#fff5f7,#fff);
  text-align: center;
  overflow-x: hidden;
}

/* screens */
.screen { display:none; padding:40px 20px; }
.active { display:block; }

/* buttons */
button {
  padding:12px 18px;
  border:none;
  border-radius:20px;
  background:#f5a623;
  color:white;
  font-weight:bold;
  cursor:pointer;
  margin:10px;
}

/* hearts */
.heart {
  font-size: 32px;
  cursor: pointer;
  margin: 5px;
  transition: 0.2s;
}

/* petals */
.petal {
  position: fixed;
  top: -10px;
  font-size: 18px;
  animation: fall linear forwards;
}
@keyframes fall {
  to { transform: translateY(110vh) rotate(360deg); opacity: 0; }
}

/* typing */
#typed {
  white-space: pre-line;
}

/* confetti */
.confetti {
  position: fixed;
  top: -10px;
  font-size: 20px;
  animation: drop 3s linear forwards;
}
@keyframes drop {
  to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
}
</style>
</head>

<body>

<!-- START -->
<div id="start" class="screen active">
  <h1 class="text-3xl font-bold text-pink-500">💛 Birthday Story</h1>
  <button onclick="next('game')">Start 💫</button>
</div>

<!-- GAME -->
<div id="game" class="screen">
  <h2 class="text-2xl font-bold">💖 Click 5 Hearts</h2>

  <div>
    <span class="heart" onclick="addLove(this)">💖</span>
    <span class="heart" onclick="addLove(this)">💗</span>
    <span class="heart" onclick="addLove(this)">💝</span>
    <span class="heart" onclick="addLove(this)">💛</span>
    <span class="heart" onclick="addLove(this)">❤️</span>
  </div>

  <p id="loveCount">0 / 5</p>
</div>

<!-- GARDEN -->
<div id="garden" class="screen">
  <h2 class="text-2xl font-bold">🌸 Flower Garden</h2>

  <button onclick="flower('You are my sunshine 🌻')">🌻</button>
  <button onclick="flower('You are loved 💛')">💛</button>
  <button onclick="flower('You are my peace 🌸')">🌸</button>

  <p id="flowerMsg"></p>

  <button onclick="next('final')">Next 💌</button>
</div>

<!-- FINAL -->
<div id="final" class="screen">
  <h2 class="text-2xl font-bold">💌 Final Message</h2>

  <div class="bg-white p-4 m-4 rounded-xl shadow">
    <div id="typed"></div>
  </div>

  <button onclick="playMusic()">▶ Play Music 🎵</button>

  <audio id="music" loop>
    <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
  </audio>

  <button onclick="checkMidnight()">Open Gift 🎁</button>

  <div id="gift" class="bg-white p-4 m-4 rounded-xl shadow hidden"></div>
</div>

<script>

let love = 0;

/* navigation */
function next(id){
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* game */
function addLove(el){
  if(el.style.opacity === "0.3") return;

  love++;
  el.style.opacity = 0.3;

  document.getElementById("loveCount").innerText = love + " / 5";

  if(love >= 5){
    setTimeout(()=> next("garden"), 500);
  }
}

/* flowers */
function flower(t){
  document.getElementById("flowerMsg").innerText = t;
}

/* music */
function playMusic(){
  document.getElementById("music").play();
}

/* midnight */
function checkMidnight(){
  const h = new Date().getHours();

  if(h === 0){
    showMessage();
  } else {
    alert("Come back at midnight 🎁");
  }
}

/* typing message */
function showMessage(){

  next("final");

  const text = `hi my sweet baby, you're 18 now!! it must feel amazing, doesn't it?

i hope you enjoy this website i made for you 💛

i love you so much sayang, from the moon and back.`;

  let i = 0;
  const el = document.getElementById("typed");
  el.innerHTML = "";

  function type(){
    if(i < text.length){
      el.innerHTML += text[i];
      i++;
      setTimeout(type, 25);
    } else {
      confetti();
    }
  }
  type();
}

/* confetti */
function confetti(){
  for(let i=0;i<50;i++){
    const c = document.createElement("div");
    c.className = "confetti";
    c.innerText = ["🌸","💛","✨","🌼","💖"][Math.floor(Math.random()*5)];
    c.style.left = Math.random()*100 + "vw";
    c.style.animationDuration = (2 + Math.random()*2) + "s";
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),4000);
  }
}

/* petals */
setInterval(()=>{
  const p = document.createElement("div");
  p.className = "petal";
  p.innerText = ["🌸","🌼","💛","💮"][Math.floor(Math.random()*4)];
  p.style.left = Math.random()*100 + "vw";
  p.style.animationDuration = (3+Math.random()*3)+"s";
  document.body.appendChild(p);
  setTimeout(()=>p.remove(),6000);
},400);

</script>

</body>
</html>
